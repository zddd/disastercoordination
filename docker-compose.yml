services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: dc-postgres
    environment:
      POSTGRES_DB: dc_center
      POSTGRES_USER: dc_user
      POSTGRES_PASSWORD: dc_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dc_user -d dc_center"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MVP 阶段可选，完整版才需要
  redis:
    image: redis:7-alpine
    container_name: dc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    profiles:
      - full
      - ""  # also start by default for development convenience

  minio:
    image: minio/minio:latest
    container_name: dc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  minio_data:
