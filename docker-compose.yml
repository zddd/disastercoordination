services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: dc-postgres
    environment:
      POSTGRES_DB: dc_center
      POSTGRES_USER: dc_user
      POSTGRES_PASSWORD: dc_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dc_user -d dc_center"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MVP 阶段可选，完整版才需要
  redis:
    image: redis:7-alpine
    container_name: dc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    profiles:
      - full
      - ""  # also start by default for development convenience

  minio:
    image: minio/minio:latest
    container_name: dc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # ---- Application Services ----

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dc-backend
    environment:
      DATABASE_URL: "postgres://dc_user:dc_pass@postgres:5432/dc_center?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "change-me-in-production-use-random-64-chars"
      PORT: "8080"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "dc-center"
      LOG_LEVEL: "info"
      UPLOAD_DIR: "/app/uploads"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dc-frontend
    environment:
      BACKEND_URL: "http://backend:8080"
      NEXT_PUBLIC_API_URL: "http://localhost:8080/api/v1"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  minio_data:
  uploads_data:
